name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install protoc-gen-kt (Kotlin protoc plugin)
        env:
          # Pinned to the version the checked-in generated code was produced with.
          # Bump deliberately and regenerate; keep CI reproducible.
          PROTOC_GEN_KT_VERSION: v0.0.0-20251214023608-0fa742406fbf
        run: |
          # The :api proto codegen shells out to `protoc-gen-kt` on PATH.
          # Public module (served by proxy.golang.org) — no auth needed.
          go install "latenighthack.com/protoc-gen-kt@${PROTOC_GEN_KT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Static analysis (detekt, advisory)
        run: ./gradlew detekt

  publish:
    # Publishes :api and :connector to Maven Central. Runs on macOS because the
    # iOS Kotlin/Native targets can only be compiled there — an ubuntu run would
    # silently skip them and publish an incomplete artifact set.
    # main push  -> "<baseVersion>-SNAPSHOT" (Central snapshot repo)
    # v* tag     -> release <version> (auto-promoted on the Central Portal)
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install protoc-gen-kt (Kotlin protoc plugin)
        env:
          # Keep in sync with the build job above.
          PROTOC_GEN_KT_VERSION: v0.0.0-20251214023608-0fa742406fbf
        run: |
          go install "latenighthack.com/protoc-gen-kt@${PROTOC_GEN_KT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
