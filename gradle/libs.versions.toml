[versions]
kotlin = "2.1.0"
ksp = "2.1.0-1.0.29"
coroutines = "1.9.0"
ktor = "3.0.2"
agp = "8.7.3"
kotlinInject = "0.7.1"
ktbuf = "1.1.2"
ktstore = "0.0.7"
ktcrypto = "0.0.4"
kotlinxDatetime = "0.6.1"
kmLogger = "2.0.3"
cache4k = "0.14.0"
micrometer = "1.10.3"
pushy = "0.15.4"
firebaseAdmin = "9.4.3"
webpush = "1.1.0"
assertk = "0.28.1"
postgresql = "42.7.3"
sqliteJdbc = "3.45.3.0"
logback = "1.5.6"
logstashEncoder = "7.4"
detekt = "1.23.7"
mavenPublish = "0.30.0"

[libraries]
kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib" }
coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }

ktbuf-library = { module = "com.latenighthack.ktbuf:ktbuf-library", version.ref = "ktbuf" }
ktbuf-rpc = { module = "com.latenighthack.ktbuf:ktbuf-rpc", version.ref = "ktbuf" }
ktbuf-server = { module = "com.latenighthack.ktbuf:ktbuf-server", version.ref = "ktbuf" }
ktbuf-test = { module = "com.latenighthack.ktbuf:ktbuf-test", version.ref = "ktbuf" }

kotlin-inject-runtime = { module = "me.tatarka.inject:kotlin-inject-runtime", version.ref = "kotlinInject" }
kotlin-inject-ksp = { module = "me.tatarka.inject:kotlin-inject-compiler-ksp", version.ref = "kotlinInject" }

ktor-server-core = { module = "io.ktor:ktor-server-core", version.ref = "ktor" }
ktor-server-cio = { module = "io.ktor:ktor-server-cio", version.ref = "ktor" }
ktor-server-websockets = { module = "io.ktor:ktor-server-websockets", version.ref = "ktor" }

ktstore-library = { module = "com.latenighthack.ktstore:ktstore-library", version.ref = "ktstore" }
ktcrypto-library = { module = "com.latenighthack.ktcrypto:ktcrypto-library", version.ref = "ktcrypto" }
kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "kotlinxDatetime" }
kmLogger = { module = "com.diamondedge:logging", version.ref = "kmLogger" }
cache4k = { module = "io.github.reactivecircus.cache4k:cache4k", version.ref = "cache4k" }
micrometer-core = { module = "io.micrometer:micrometer-core", version.ref = "micrometer" }
micrometer-registry-prometheus = { module = "io.micrometer:micrometer-registry-prometheus", version.ref = "micrometer" }
pushy = { module = "com.eatthepath:pushy", version.ref = "pushy" }
firebase-admin = { module = "com.google.firebase:firebase-admin", version.ref = "firebaseAdmin" }
webpush = { module = "com.interaso:webpush", version.ref = "webpush" }
assertk = { module = "com.willowtreeapps.assertk:assertk", version.ref = "assertk" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
sqlite-jdbc = { module = "org.xerial:sqlite-jdbc", version.ref = "sqliteJdbc" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
logstash-logback-encoder = { module = "net.logstash.logback:logstash-logback-encoder", version.ref = "logstashEncoder" }

[plugins]
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlinJvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
mavenPublish = { id = "com.vanniktech.maven.publish", version.ref = "mavenPublish" }
