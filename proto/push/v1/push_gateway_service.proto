syntax = "proto3";

package com.latenighthack.lockers.push.v1;

option java_package = "com.latenighthack.lockers.push.v1";

import "common/v1/model.proto";

service PushGateway {
  rpc SendPush(SendPushRequest) returns (SendPushResponse);
}

message SendPushRequest {
  common.v1.SessionId session_id = 1;
  common.v1.Push push = 2;
}

message SendPushResponse {
  Result result = 1;
  enum Result {
    OK = 0;
    UNKNOWN_ERROR = 10;
  }
}
