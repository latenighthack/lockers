syntax = "proto3";

package com.latenighthack.lockers.server.storage.v1;

option java_package = "com.latenighthack.lockers.connector.storage.v1";

message StoredSubscription {
    bytes room_id_raw_value = 1;
    bool is_pending_remove = 2;
    bool is_pending_add = 3;
}

message StoredAck {
    bytes room_id_raw_value = 1;
    bytes event_id_raw_value = 2;
}

message StoredLocker {
    bytes room_id_raw_value = 1;
    bytes locker_id_raw_value = 2;
    int64 locker_keyspace = 3;
    bytes locker_payload = 4;
    int64 version = 5;
}

// The client's desired push credential for one backend. backend mirrors
// push.v1.PushBackend; encoded_registration is a serialized
// push.v1.PushRegistration. is_pending is true until the current session has
// acknowledged the (re)registration.
message StoredPushRegistration {
    int32 backend = 1;
    bytes encoded_registration = 2;
    bool is_pending = 3;
}