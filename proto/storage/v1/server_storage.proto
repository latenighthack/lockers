syntax = "proto3";

package com.latenighthack.lockers.server.storage.v1;

option java_package = "com.latenighthack.lockers.server.storage.v1";

message ServerSessionId {
    bytes raw_value = 1;
}

message ServerRoomId {
    bytes raw_value = 1;
}

message ServerLockerId {
    bytes raw_value = 1;
}

message ServerEventId {
    bytes raw_value = 1;
}

message ServerSession {
    ServerSessionId session_id = 1;
    bytes next_key_material = 2;
    bytes authorized_public_key = 3;
}

message ServerSubscription {
    ServerSessionId session_id = 1;
    ServerRoomId room_id = 2;
}

message ServerSessionEvent {
    ServerSessionId session_id = 1;
    ServerRoomId room_id = 2;
    ServerEventId event_id = 3;
    bytes encoded_payload = 4;
    bytes encoded_locker = 5;
}

message ServerLocker {
    ServerRoomId room_id = 1;
    int64 keyspace = 2;
    ServerLockerId locker_id = 3;
    bytes locker = 4;
    int64 version = 5;
}

// A lock at some scope of a room. scope_kind: 0 = locker, 1 = keyspace, 2 = room.
// keyspace/locker_id are only meaningful for the narrower scopes; unused slots
// carry sentinel values so the composite primary key stays uniform. lock_state
// is a serialized common.v1.LockState (public key, delegation chain, ratchet
// distribution). version is the optimistic-concurrency guard for lock/unlock.
message ServerLock {
    ServerRoomId room_id = 1;
    int64 scope_kind = 2;
    int64 keyspace = 3;
    ServerLockerId locker_id = 4;
    bytes lock_state = 5;
    int64 version = 6;
}

message ServerPushId {
    bytes raw_value = 1;
}

// A queued push for one session and one backend. backend mirrors
// push.v1.PushBackend; encoded_push is a serialized common.v1.Push. Each
// backend is its own queue row so one dead token never blocks the others.
// attempt is the persisted delivery-attempt count, so the retry budget (and the
// dead-letter threshold) survive a restart instead of resetting to zero.
message ServerPush {
    ServerPushId push_id = 1;
    ServerSessionId session_id = 2;
    int32 backend = 3;
    bytes encoded_push = 4;
    int32 attempt = 5;
}

// A push that exhausted its retry budget (or was permanently rejected) and was
// parked here so it stops competing for processing. Retained for inspection and
// manual retry/purge via the PushAdmin service. reason is the last failure;
// dead_lettered_at is epoch milliseconds.
message ServerDeadLetter {
    ServerPushId push_id = 1;
    ServerSessionId session_id = 2;
    int32 backend = 3;
    bytes encoded_push = 4;
    int32 attempts = 5;
    string reason = 6;
    int64 dead_lettered_at = 7;
}

// One backend's stored credentials. backend mirrors push.v1.PushBackend;
// encoded_registration is a serialized push.v1.PushRegistration.
message ServerPushRegistration {
    int32 backend = 1;
    bytes encoded_registration = 2;
}

message ServerPushInfo {
    ServerSessionId session_id = 1;
    repeated ServerPushRegistration registrations = 2;
}
