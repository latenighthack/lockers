kotlin.code.style=official
org.gradle.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options="-Xmx2048M"
kotlin.mpp.androidSourceSetLayoutVersion=2

# Canonical dev version. main pushes publish "<baseVersion>-SNAPSHOT"; a v<baseVersion>
# tag publishes the release. Bump this to the next dev version after cutting a release.
baseVersion=0.1.0

# Shared POM metadata consumed by the vanniktech maven-publish plugin (Maven Central
# requires url/license/scm/developer). Per-module name+description live in each build file.
# TODO(mike): confirm the license — Apache-2.0 is a placeholder (no LICENSE file in repo).
POM_URL=https://github.com/latenighthack/lockers
POM_LICENSE_NAME=The Apache License, Version 2.0
POM_LICENSE_URL=https://www.apache.org/licenses/LICENSE-2.0.txt
POM_LICENSE_DIST=repo
POM_SCM_URL=https://github.com/latenighthack/lockers
POM_SCM_CONNECTION=scm:git:git://github.com/latenighthack/lockers.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://git@github.com/latenighthack/lockers.git
POM_DEVELOPER_ID=latenighthack
POM_DEVELOPER_NAME=Late Night Hack
POM_DEVELOPER_URL=https://github.com/latenighthack
